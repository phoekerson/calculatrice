name: Deploy React App to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Cloner le repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3️⃣ Installer les dépendances et build React
      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      # 4️⃣ Déployer sur S3
      - name: Deploy to S3
        uses: aws-actions/s3-sync@v2
        with:
          source-dir: 'dist'                    # dossier build de ton React app
          bucket: 'g2-calculatrice'            # ton bucket S3
          delete: true                          # supprime les fichiers obsolètes
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: 'eu-north-1'